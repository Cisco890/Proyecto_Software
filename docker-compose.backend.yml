version: '3.8'

services:
  backend-db:
    image: postgres:15-alpine
    container_name: backend-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-backend_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-backend_pass}
      POSTGRES_DB: ${DB_NAME:-backend_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - backend_db_data:/var/lib/postgresql/data
      - ./Backend/archivossql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-backend_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-api:
    build:
      context: ./Backend
      dockerfile: Dockerfile.optimized
    container_name: backend-api
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - DATABASE_URL=postgresql://${DB_USER:-backend_user}:${DB_PASSWORD:-backend_pass}@backend-db:5432/${DB_NAME:-backend_db}
      - PORT=3001
    ports:
      - "${API_PORT:-3001}:3001"
    volumes:
      - ./Backend:/app
      - /app/node_modules
    depends_on:
      backend-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    command: |
      sh -c "
        echo 'Esperando base de datos...' &&
        npx prisma migrate deploy &&
        npx prisma db seed &&
        echo 'Iniciando servidor...' &&
        npm start
      "

volumes:
  backend_db_data:
    driver: local

networks:
  default:
    name: backend_network
