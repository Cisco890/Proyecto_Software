version: '3.8'

services:
  # Base de datos
  database:
    image: postgres:15-alpine
    container_name: app-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-app_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-app_password}
      POSTGRES_DB: ${DB_NAME:-app_database}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - app_db_data:/var/lib/postgresql/data
      - ./Backend/archivossql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-app_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # Backend API
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile.optimized
    container_name: app-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - DATABASE_URL=postgresql://${DB_USER:-app_user}:${DB_PASSWORD:-app_password}@database:5432/${DB_NAME:-app_database}
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-your_jwt_secret}
    volumes:
      - ./Backend:/app
      - /app/node_modules
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - app-network
    command: |
      sh -c "
        echo '🔄 Aplicando migraciones...' &&
        npx prisma migrate deploy &&
        echo '🌱 Ejecutando seeds...' &&
        npx prisma db seed &&
        echo '🚀 Iniciando API...' &&
        npm start
      "

  # Frontend
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile.optimized
    container_name: app-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - EXPO_PUBLIC_API_URL=http://backend:3001/api
      - EXPO_PUBLIC_IS_DEV_MODE=true
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
      - REACT_NATIVE_PACKAGER_HOSTNAME=${FRONTEND_HOST:-localhost}
    ports:
      - "${EXPO_PORT:-19000}:19000"
      - "${EXPO_DEV_PORT:-19001}:19001"
      - "${EXPO_TOOLS_PORT:-19002}:19002"
      - "${METRO_PORT:-8081}:8081"
    volumes:
      - ./Frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network

  # Nginx Load Balancer
  nginx:
    image: nginx:alpine
    container_name: app-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx.optimized.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - app-network

volumes:
  app_db_data:
    driver: local

networks:
  app-network:
    driver: bridge
